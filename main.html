<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Package Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Package Calculator</h1>
        <table>
            <thead>
                <tr>
                    <th>Internal Length</th>
                    <th>Internal Width</th>
                    <th>Internal Height</th>
                    <th>Wall Thickness</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="number" step="0.1" id="l"></td>
                    <td><input type="number" step="0.1" id="w"></td>
                    <td><input type="number" step="0.1" id="h"></td>
                    <td><input type="number" step="0.1" id="t"></td>
                </tr>
                <tr>
                    <th>Volume</th>
                    <th>Company</th>
                    <th>blank</th>
                </tr>
                <tr>
                    <td><select name="volume">
                        <option value="exact">Closest fit</option>
                        <option value="idk">Something else</option>
                    </select></td>
                    <td><select name="company">
                        <option value="a">Altor something</option>
                        <option value="b">not Altor</option>
                    </select></td>
                    <td><input type="checkbox"></td>
                </tr>
            </tbody>
        </table>
        <div>
            <button onclick="calculate()">calc</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Internal Volume</th>
                    <th>Total Volume</th>
                    <th>Dimweight</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th id="outputexvol"></th>
                    <th id="outputvol"></th>
                    <th id="outputdimweight"></th>
                </tr>
            </tbody>
        </table>
        <script type="text/javascript">
            function calculate(){

                const packageList = [
                    ["id","il","iw","ih","iv","v","company","dw"],
                    [],
                    [],
                    [],
                ];

                var length = parseFloat(document.getElementById("l").value);
                var width = parseFloat(document.getElementById("w").value);
                var height = parseFloat(document.getElementById("h").value);
                var thickness = parseFloat(document.getElementById("t").value);
                var internalVol = (length*width*height).toPrecision(6);
                var externalVol = ((length+thickness)*(width+thickness)*(height+thickness)).toPrecision(6);
                var dimweight = (externalVol/166).toPrecision(6);
                document.getElementById("outputexvol").innerHTML = internalVol + " cubic inches";
                document.getElementById("outputvol").innerHTML = externalVol + " cubic inches";
                document.getElementById("outputdimweight").innerHTML = dimweight + " lbs";
            }
        </script>
    </body>
</html>
